name: Java SonarCloud Analysis (No Gradle Plugin)

on:
  push:
    branches: [ main ]

jobs:
  sonarcloud:
    name: Build, Test and Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and Run Tests
        run: ./gradlew build

      - name: SonarCloud Scan via Action
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=kieaer
            -Dsonar.projectKey=Essentials
            -Dsonar.sources=Essential/src/main/kotlin
            -Dsonar.tests=Essential/src/test/kotlin
            -Dsonar.java.binaries=Essential/build/classes/kotlin/main
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml