achievement.oil=Нафта
description.aggressor=Симулятор PvP
description.blackwater=Багато людей не знають навичок тих, хто знаходиться в цих чорних водах.
description.creator=Ви стали ветераном, граючи лише в пісочниці без будь-яких цілей.
description.defender=Пасивна гра стала щоденною рутіною
description.eliminator=Багато людей будуть боятися вашої присутності.
description.erekir=Ви стали самою планетою Еркіас.
description.serpulo=Ви граєте лише на Серпуло з Mindustry 4.0 і стали гнилою водою.
description.oil=Якщо ви продовжуватимете грати в одну гру, з часом вона перетвориться на нафту, підземний ресурс. Так само, як і ви.
description.turbidwater=Якщо ви довго граєте в гру, поступово вийдете за межі її рамок.
achievement.lord=Лорд
description.lord=У PvP, якщо цей користувач у вашій команді, вони автоматично здійснять несподіване поклоніння.
target.lord=Загальний коефіцієнт перемог у PvP досягає {0}%
