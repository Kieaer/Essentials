cleared=Виконано
achievement.asteroids=Астронавт
target.asteroids=Очистіть карту Asteroids_v3
description.asteroids=Навіть якщо зоряне небо розіб'ється, шлях, який я повинен пройти, продовжиться до кінця
achievement.transcendence=Танк
target.transcendence=Очистіть карту Transcendence
description.transcendence=Ви відганяли ворогів танками.
achievement.meetowner=Зустріти бога
target.meetowner=Зустріти власника сервера.
description.meetowner=Якщо ви можете побачити, хто створив сервер, це означає, що сервер працює добре.
achievement.serpuloquad=Пілот Квада
target.serpuloquad=Керуйте юнітом Квад на Серпуло
description.serpuloquad=Ви з'їли Квада, який просто стояв на місці

achievement.newyear=Новорічне привітання
target.newyear=Напишіть '새해 복' в чаті
description.newyear=З Новим роком! Нехай цей рік у Mindustry буде процвітаючим!

achievement.loyal=Лояльний гравець
target.loyal=Увійдіть після 5 днів відсутності
description.loyal=З поверненням! Ми сумували за вами. Без вас на сервері було самотньо.

achievement.loyalsixmonths=Давно втрачений гравець
target.loyalsixmonths=Увійдіть після 6 місяців відсутності
description.loyalsixmonths=Ого, ви повернулися! Ми думали, що ви пішли назавжди. Сервер сильно змінився з вашого останнього візиту.

achievement.loyaloneyearsixmonths=Стародавній гравець
target.loyaloneyearsixmonths=Увійдіть після 1 року та 6 місяців відсутності
description.loyaloneyearsixmonths=Жива легенда повертається! Ваше ім'я згадувалося лише в міфах та легендах. Ласкаво просимо назад у зовсім інший світ.

achievement.allmaps=Підкорювач карт
target.allmaps=Пройдіть всі доступні карти
description.allmaps=Ви підкорили кожне випробування, яке може запропонувати цей сервер. Карти більше не приховують від вас жодних таємниць.

achievement.discordauth=Верифіковано в Discord
target.discordauth=Зв'яжіть свій обліковий запис Discord з ігровим акаунтом
description.discordauth=Ви підтвердили свою особу, зв'язавши обліковий запис Discord. Тепер усі знають, хто ви насправді!

achievement.waterextractor=Водозабірник на воді
target.waterextractor=Побудуйте 10 водозабірників на водних плитках
description.waterextractor=Будувати водозабірники на воді — це як черпати воду з океану. Ефективно, але трохи безглуздо.

achievement.attendance=Король відвідуваності
target.attendance=Досягніть 100 днів відвідуваності
description.attendance=Тепер ви офіційно є частиною цього сервера. Заходите щодня, невже вам більше нічим зайнятися?

# New achievements
achievement.crawlerblockdestroyer=Експерт з демонтажу Кроулерами
target.crawlerblockdestroyer=Знищте 5 блоків однією атакою юніта Кроулер
description.crawlerblockdestroyer=Ви опанували мистецтво використання кроулерів як інструментів точного знесення. Вражає і лякає.

achievement.solomapclear=Одиночний підкорювач
target.solomapclear=Пройдіть карту атаки Серпуло або Ерекір самостійно
description.solomapclear=Кому потрібні союзники, якщо є вміння? Ви довели, що можете впоратися з будь-яким випробуванням самотужки.

achievement.longplaynoafk=Чемпіон з витривалості
target.longplaynoafk=Грайте на одній карті більше 5 годин без переходу в AFK
description.longplaynoafk=Ваша зосередженість легендарна. П'ять годин безперервної гри без перерви — це відданість, з якою мало хто може зрівнятися.

achievement.nominingclear=Захисник ресурсів
target.nominingclear=Пройдіть гру без видобутку ресурсів будь-якими юнітами
description.nominingclear=Ви довели, що видобуток необов'язковий. Справжній стратег працює з тим, що має.

achievement.serpulopvpwin=Домінатор Серпуло
target.serpulopvpwin=Виграйте 5 разів у PvP на картах Серпуло
description.serpulopvpwin=Піски Серпуло були свідками ваших перемог. Вороги відступають лише при згадці вашого імені.

achievement.erekirpvpwin=Підкорювач Ерекіра
target.erekirpvpwin=Виграйте 5 разів у PvP на картах Ерекіра
description.erekirpvpwin=Суворий ландшафт Ерекіра схиляється перед вашим стратегічним генієм. Вороги бояться вашого наближення.

achievement.bothplanetspvpwin=Міжпланетний полководець
target.bothplanetspvpwin=Виграйте 10 разів як на картах Серпуло, так і на Ерекірі
description.bothplanetspvpwin=Жодна планета не застрахована від вашого тактичного блиску. Ви опанували ведення війни між світами.

achievement.leaveandlosepvp=Майстер тактичного відступу
target.leaveandlosepvp=Програйте 10 разів після виходу з PvP гри
description.leaveandlosepvp=Іноді найкраща стратегія — це знати, коли піти. Ви вдосконалили мистецтво тактичного відступу.

achievement.pvpwinmaster=Легенда PvP
target.pvpwinmaster=Виграйте 300 разів у будь-якому режимі PvP
description.pvpwinmaster=Ваше ім'я викликає страх у серцях опонентів. Ваша спадщина перемог є неперевершеною.

achievement.mapclearmaster=Ветеран кампаній
target.mapclearmaster=Пройдіть будь-які карти 10 разів
description.mapclearmaster=Ви все бачили, все робили і все підкорили. Карти — це просто майданчики для вашого стратегічного розуму.

achievement.turretmultikill=Точний стрілець
target.turretmultikill=Знищте 5 або більше юнітів одночасно однією кулею
description.turretmultikill=Один постріл, п'ять смертей. Ваше прицілювання легендарне, а розрахунок часу бездоганний.

achievement.quillkiller=Мисливець на Квілів
target.quillkiller=Знищте 5 або більше юнітів Квіл протягом 10 секунд
description.quillkiller=Квіли думали, що вони в безпеці завдяки своїй кількості. Ви довели протилежне з руйнівною ефективністю.

achievement.zenithkiller=Вбивця Зенітів
target.zenithkiller=Знищте 30 або більше юнітів Зеніт протягом 10 секунд
description.zenithkiller=Небо належить вам. Юніти Зеніт засвоїли цей урок на власному досвіді.

achievement.omurahorizonkiller=Мисливець на Горизонти
target.omurahorizonkiller=Знищте 5 або більше юнітів Горизонт одночасно однією кулею з Омури
description.omurahorizonkiller=Гнів океану, спрямований через вашу Омуру, забрав багато Горизонтів одним руйнівним ударом.

achievement.pvpwinstreak=Нестримна сила
target.pvpwinstreak=Виграйте 5 ігор поспіль у режимі PvP
description.pvpwinstreak=Перемога за перемогою, ви довели свою непереможність. Опоненти дивуються, чи можна вас взагалі зупинити.

achievement.pvpwinrate=Ефективний тактик
target.pvpwinrate=Досягніть коефіцієнта перемог у PvP у 20%
description.pvpwinrate=Якість важливіша за кількість. Ваш стратегічний розум гарантує перемогу тоді, коли це найважливіше.

achievement.pvpunderdog=Всупереч усьому
target.pvpunderdog=Виграйте у PvP, коли в команді суперника на 3 або більше гравців більше, ніж у вашій
description.pvpunderdog=Меншість, але не слабкість. Ви повернули ситуацію на свою користь проти переважаючих сил.

achievement.warpserverdisconnect=Мережевий навігатор
target.warpserverdisconnect=Підключіться до сервера, коли всі варп-сервери відключені
description.warpserverdisconnect=Коло всі шляхи були закриті, ви знайшли свій шлях крізь цифрову пустелю.

achievement.explosionkiller=Ланцюгова реакція
target.explosionkiller=Знищте 10 або більше юнітів вибуховою шкодою від підконтрольного вам юніта
description.explosionkiller=Ви опанували мистецтво контрольованого хаосу, перетворивши знищення свого юніта на руйнівну зброю.

achievement.lowpowerclear=Експерт з енергоефективності
target.lowpowerclear=Пройдіть карту, підтримуючи максимальну потужність енергії менше 2к
description.lowpowerclear=Менше означає більше. Ви довели, що перемога не вимагає надмірної енергетичної інфраструктури.

achievement.pvpdefeatstreak=Немезида
target.pvpdefeatstreak=Переможіть гравця або його команду 5 разів поспіль у PvP
description.pvpdefeatstreak=Ви стали чиїмось найгіршим кошмаром, послідовно руйнуючи їхні сподівання на перемогу.

achievement.nopowerclear=Перемога без енергії
target.nopowerclear=Пройдіть режим атаки без генерації енергії
description.nopowerclear=Кому потрібна електрика? Ви довели, що старі методи все ще чудово працюють.

achievement.noturretsclear=Пацифістський підхід
target.noturretsclear=Пройдіть режим атаки без будівництва турелей
description.noturretsclear=Найкращий захист — це напад, а у вашому випадку — взагалі жодного захисту. Воістину нетрадиційна перемога.

achievement.duoturretsurvival=Мінімалістичний захисник
target.duoturretsurvival=Виживіть 100 хвиль, використовуючи лише турелі Duo
description.duoturretsurvival=Просто, але ефективно. Ви довели, що навіть найпростіша оборона може витримати випробування часом.

achievement.flareonlyclear=Сила Флерів
target.flareonlyclear=Пройдіть режим атаки, використовуючи лише юніти Флер
description.flareonlyclear=Малі, але могутні. Ваша армія флерів досягла того, що більшість вважала неможливим.

achievement.votingban=Іронічне правосуддя
target.votingban=Отримайте бан після початку голосування
description.votingban=Система, яку ви намагалися використати, обернулася проти вас. Урок про небезпеки демократії.

achievement.pvpcontribution=Неоспіваний герой
target.pvpcontribution=Внесіть вклад, що більш ніж удвічі перевищує очки вашої команди у програному матчі
description.pvpcontribution=Ваш блиск сяяв навіть у поразці. Іноді одна людина не може витягнути всю команду.

achievement.apm50=Швидкі пальці
target.apm50=Досягніть APM (дій за хвилину) 50 або більше
description.apm50=Тепер ви знаєте, що робити далі. Ваша ефективність підвищується.

achievement.apm100=Блискавичні руки
target.apm100=Досягніть APM 100 або більше
description.apm100=Ви досягли точки, коли можете робити кілька речей одночасно, випереджаючи думку про те, що будете робити.
achievement.apm200=Альфаго
target.apm200=Досягніть APM 200 або більше
description.apm200=Ви справді людина? Як ви проходите це досягнення?

achievement.mapprovider=Картограф спільноти
target.mapprovider=Надайте карти для сервера
description.mapprovider=Ваші творчі внески розширили горизонти сервера. Ваша спадщина живе в кожному матчі.

achievement.feedbackprovider=Конструктивний критик
target.feedbackprovider=Надайте відгук, щоб допомогти з новим контентом для сервера
description.feedbackprovider=Ваші ідеї допомогли сформувати еволюцію сервера. Спільнота стає сильнішою завдяки вашому внеску.
