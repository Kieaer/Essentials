command.help.broadcast=用法: [green]/broadcast [sky]<消息...>[][]\n向与此服务器连接的所有服务器发送消息。\n[purple]== 示例[]\n/broadcast 10分钟后服务器爆炸。\n/broadcast 服务器即将维护
command.help.changeMap=用法: [green]/changemap [sky]<地图名称> <游戏模式>[][]\n立即更改地图。\n如果未指定游戏模式值，则在更改世界时使用之前的游戏模式。\n[purple]== 示例[]\n/changemap 1\n/changemap 3 attack\n/changemap maze\n/changemap fortress pvp
command.help.changeName=用法: [green]/changepw [sky]<新名称> [目标玩家][][]\n更改玩家名称。\n[purple]== 示例[]\n/changename test1 Gureumi\n/changename 布拉 ぐれうみ
command.help.changePw=用法: [green]/changepw [sky]<新密码> <重新输入密码>[][]\n更改账户密码。\n[purple]== 示例[]\n/changepw test1 test1\n/changepw password123 password123
command.help.chars=用法: [green]/chars [sky]<文字>[][]\n在当前位置用方块写出文字。(仅支持英文)\n[purple]== 示例[]\n/chars text\n/chars hello\n/chars it's text!
command.help.chat=用法: [green]/chat [sky]<on/off>[][]\n禁止或解除所有玩家的聊天。\n只有拥有 [green]chat.admin[] 权限节点的用户才能聊天。\n[purple]== 示例[]\n/chat on\n/chat off
command.help.color=用法: [green]/color[]\n将自己的昵称改为流动的彩虹色。\n再次输入则恢复原昵称。
command.help.discord=用法: [green]/discord[]\n生成用于Discord验证的PIN码。\n将此PIN码输入到Discord服务器中的特定频道即可完成验证。
command.help.dps=用法: [green]/dps[]\n创建可计算每秒伤害的方块。\n再次输入则移除该方块。
command.help.effect=用法: [green]/effect [sky]<on/off 或 等级> [颜色][][]\n可以设置等级效果，或开启/关闭其他玩家的等级效果。\n\n如果想要设置等级效果，输入想要的等级即可看到该等级的移动效果。\n不能设置高于当前等级。\n也可以更改颜色。\n[purple]== 示例[]\n/effect 10\n/effect 30 red\n/effect 50 sky\n\n如果想要开启/关闭其他玩家的效果，请使用 on/off。\n[purple]== 示例[]\n/effect on\n/effect off
command.help.exp=用法: [green]/exp [sky]<set/hide/add/remove> [数字或玩家名称] [玩家名称][][]\n设置经验值或从排行榜中排除。\n[purple]== 示例[]\n/exp hide\n隐藏当前玩家在排名中的位置。\n/exp set 300\n设置经验值。\n/exp set 500 Gureumi\n设置该玩家的经验值。\n/exp add 1000\n增加经验值。/exp remove 200\n删除经验值。
command.help.fillItems=用法: [green]/fillitems [sky][队伍名称][][]\n用物品填充核心。\n[purple]== 示例[]\n/fillitems\n/fillitems crux\n/fillitems sharded
command.help.freeze=用法: [green]/freeze [sky]<玩家名称>[][]\n使该玩家在当前位置无法移动。\n[purple]== 示例[]\n/freeze Gureumi\n/freeze 2\n/freeze Gu
command.help.gg=用法: [green]/gg [获胜队伍名称][]\n字面意思，立即投降处理。\n[purple]== 示例[]\n/gg\n/gg crux
command.help.god=用法: [green]/god [sky]<玩家名称>[][]\n使玩家的生命力变为无限。\n[purple]== 示例[]\n/god\n/god 昵称\n/god Gureumi
command.help.help=用法: [green]/help [sky]<页码或命令>[][]\n查看命令列表或查看该命令的说明。\n[purple]== 示例[]\n/help\n/help 2\n/help motd
command.help.hub=用法: [green]/hub [sky]<set/zone/block/count/total/remove> [服务器IP] [选项][][]\n在当前位置创建可传送到其他服务器的区域、方块、人数计数器等。\n要让用户连接到正确的服务器，服务器地址必须是外部IP或域名。\n\n[purple]== 示例[]\n[green]/hub set[]\n将当前服务器设置为枢纽服务器，并将玩家队伍设置为Derelict。\n[green]/hub zone mindustry.kr 10 true[]\n输入此命令后，点击起点和终点以指定范围。\n然后单位进入指定范围或点击即可进入此服务器。\n[green]/hub block mindustry.kr owner's server[]\n点击当前位置的方块即可连接到mindustry.kr服务器。\n并且该方块上会附有服务器人数及owner's server说明信息。\n破坏该方块将自动消失。\n[green]/hub count mindustry.kr[]\n在当前位置用方块显示服务器人数。\n[green]/hub total[]\n在当前位置计算通过 /hub 命令连接的所有服务器人数，并用方块显示。\n[green]/hub remove mindustry.kr:7000[]\n删除连接到该服务器的所有方块和进入区域。\n[green]/hub reset[]\n删除所有玩家计数器。
command.help.hud=用法: [green]/hud [sky]<类型>[][]\n在屏幕上显示信息。\n再次输入可开启或关闭HUD。\n[purple]== 示例[]\n/hud health - 在屏幕上显示信息\n/hud apm - 在屏幕上显示玩家的APM值。
command.help.info=用法: [green]/info [sky]<玩家名称>[][]\n显示该用户的信息。\n[purple]== 示例[]\n/info\n/info Gureumi
command.help.js=用法: [green]/js [sky]<代码>[][]\n在服务器上执行输入的代码。\n因为可以直接控制服务器，所以将此命令权限授予其他用户时请小心。\n[purple]== 示例[]\n/js Call.sendMessage("你好!");\n/js Vars.netServer.admins.admins.toString();
command.help.kickAll=用法: [green]/kickall[]\n踢出除自己和管理员外的所有用户。\n被踢出的用户在一段时间内无法进入服务器。
command.help.kill=用法: [green]/kill [sky]<玩家名称>[][]\n立即摧毁自己的单位或对方的单位。\n[purple]== 示例[]\n/kill\n/kill Gureumi
command.help.killAll=用法: [green]/killall [sky]<队伍名称>[][]\n摧毁自己的队伍或对应队伍的所有单位。\n[purple]== 示例[]\n/killall\n/killall malis\n/killall derelict
command.help.killUnit=用法: [green]/killunit [sky]<单位名称> [要摧毁的单位数量] [队伍名称][][]\n摧毁特定单位。\n如果不指定摧毁数量或为0，则摧毁所有对应的单位。\n[purple]== 示例[]\n/killunit dagger\n/killunit alpha 5\n/killunit merui 0 crux
command.help.language=用法: [green]/language [sky]<区域设置>[][]\n设置当前账户的语言。\n[purple]== 示例[]\n/language en_US\n/language ko_KR
command.help.log=用法: [green]/log []\n开启方块日志。\n[purple]== 示例[]\n/log
command.help.login=用法: [green]/login [sky]<账号> <密码>[][]\n登录之前使用过的账户。\n[purple]== 示例[]\n/login yourid password\n/login blahblah loremipsum
command.help.maps=用法: [green]/maps [sky]<页码>[][]\n显示服务器中的地图列表。\n[purple]== 示例[]\n/maps\n/maps 3
command.help.me=用法: [green]/me [sky][要说的话][][]\n使用特殊的聊天格式来突出自己的聊天。\n[purple]== 示例[]\n/me 请不要贴分流器\n/me 你好!
command.help.meme=用法: [green]/meme [sky][类型][][]\n试试这个充满梗图的命令吧!\n[purple]== 示例[]\n/meme router
command.help.motd=用法: [green]/motd[]\n查看今日服务器消息。
command.help.mute=用法: [green]/mute [sky]<玩家名称>[][]\n禁止该玩家聊天。\n[purple]== 示例[]\n/mute Gureumi
command.help.not.exists=未找到命令! 请输入 /help 查看列表。
command.help.pause=用法: [green]/pause[]\n暂停游戏。此选项会影响所有玩家。
command.help.players=用法: [green]/players [sky]<页码>[][]\n查看当前服务器中的玩家列表。\n当因为投票或昵称中的特定字符而无法选择玩家时，可以仅输入数字来使用。\n[purple]== 示例[]\n/players\n/players 1\n/players 3
command.help.pm=用法: [green]/pm [sky]<玩家名称> [消息...][][]\n向目标玩家发送私密消息。\n[purple]== 示例[]\n/pm 1 你好!\n/pm Gureumi 您好!
command.help.ranking=用法: [green]/ranking [sky]<time/exp/attack/place/break/pvp> [页码][][]\n显示玩家排名。\n[purple]== 示例[]\n/ranking time\n/ranking place\n/ranking exp
command.help.reg=用法: [green]/reg [sky]<账号> <密码> <重新输入密码>[][]\n某些服务器可能设置为需要注册才能游玩。\n此时注册账户即可游玩服务器，且游戏数据会记录在服务器上。\n为防止输错密码，需要输入两次相同的密码才能注册账户。\n[green]== 正确方法[]\n/reg Gureumi password password\n[scarlet]== 错误方法[]\n/reg Gureumi password blahblah
command.help.report=用法: [green]/report [sky]<玩家名称> <举报原因...>[][]\n举报玩家\n管理员或服务器运营人员可以查看并处理。\n[purple]== 示例[]\n/report Gureumi 这人骂人\n/report Baka 这家伙搞破坏
command.help.rollback=用法: [green]/rollback [sky]<玩家名称>[][]\n取消特定玩家执行过的操作。\n[purple]== 示例[]\n/rollback Gureumi\n/rollback baka
command.help.search=用法: [green]/search [sky]<玩家名称>[][]\n当需要玩家的信息时使用。\n此功能即使该玩家离线时也可使用。\n[purple]== 示例[]\n/search Gureumi
command.help.setItem=用法: [green]/setitem [sky]<物品名称> <数量> [队伍名称][][]\n设置核心中物品的数量。\n[purple]== 示例[]\n/setitem copper 100\n/setitem lead 500/n/setitem silicon sharded
command.help.setPerm=用法: [green]/setperm [sky]<玩家名称> <组名称>[][]\n设置该玩家的权限组。\n组列表可在服务器内的 permission.txt 文件中找到。\n[purple]== 示例[]\n/setperm Gureumi owner\n/setperm Gureumi admin
command.help.skip=用法: [green]/team [sky]<队伍名称> <玩家名称>[][]\n更改自己的队伍或对方的队伍。\n可用队伍为 derelict, sharded, crux, green, malis, blue。\n在PvP或攻击中使用时，可能会根据地图设置产生意外的结果!\n[purple]== 示例[]\n/skip 5\n/skip 8
command.help.spawn=用法: [green]/spawn [sky]<unit/block> <单位/方块名称> [数量(角度)/方块队伍名称] [单位队伍名称][][]\n召唤单位或方块。\n[purple]== 示例[]\n/spawn unit dagger 10\n在当前位置召唤10个匕首单位。\n/spawn block duo 90\n在当前位置召唤一个面向右侧的双子炮塔方块。\n/spawn block copper-wall crux\n在当前位置安装crux队伍的铜墙。
command.help.status=用法: [green]/status[]\n显示服务器信息。\n如果TPS低于55，则表示服务器性能已达极限，游戏会出现延迟。
command.help.strict=用法: [green]/strict [sky]<玩家名称>[][]\n限制目标玩家的行为。\n对旁观者或搞破坏的用户很有用。\n[purple]== 示例[]\n/strict Gureumi\n/strict 3\n/strict reumi
command.help.team=用法: [green]/team [sky]<队伍名称> <玩家名称>[][]\n更改自己的队伍或对方的队伍。\n可用队伍为 derelict, sharded, crux, green, malis, blue。\n[purple]== 示例[]\n/team crux\n/team Gureumi crux\n/team Gureumi green
command.help.tempBan=用法: [green]/tempban [sky]<玩家名称> <时间> <封禁原因>[][]\n在一定时间内封禁该玩家。\n时间单位为"分钟"。\n[purple]== 示例[]\n/tempban Gureumi 5 因为是笨蛋\n/tempban Gureumi 60 禁止刷屏
command.help.time=用法: [green]/time[]\n显示服务器时间。
command.help.tp=用法: [green]/tp [sky]<玩家名称>[][]\n立即传送到该玩家的位置。\n[purple]== 示例[]\n/tp Gureumi
command.help.tpp=用法: [green]/tpp [sky]<玩家名称>[][]\n将摄像机锁定到目标玩家。\n当该玩家离开服务器或再次输入命令时，解除摄像机锁定。\n[purple]== 示例[]\n/tpp Gureumi\n/tpp 笨蛋
command.help.unban=用法: [green]/unban [sky]<uuid/ip>[][]\n解除玩家的封禁。\n[purple]== 示例[]\n/unban AAAAAAAAAAAAAAA==\n/unban 127.0.0.1
command.help.unmute=用法: [green]/unmute [sky]<玩家名称>[][]\n解除该玩家的聊天禁止。\n[purple]== 示例[]\n/unmute Gureumi
command.help.url=用法: [green]/url [sky]<命令名称>[][]\n打开特定命令中包含的URL。使用此命令将连接到外部网页浏览器。\n[purple]== 示例[]\n/url hub
command.help.vote=用法: [green]/vote [sky]<kick/map/gg/skip/back/random/reset> [玩家名称/次数/地图名称] [原因][][]\n通过投票移动到指定地图、游戏结束、踢人、跳过波次等。\n[brown]== 命令结构[]\n[orange]/vote kick <名称> <踢出原因>[]\n此命令开始踢出玩家的投票。\n[orange]/vote map <地图名称部分或地图编号> <地图选择原因>[]\n此命令开始移动到该地图的投票。\n[orange]/vote skip <要跳过的波次数>[]\n此命令开始一次跳过输入数量的波次的投票。\n[orange]/vote back <回溯原因>[]\n此命令开始加载之前保存的地图状态的投票。\n[orange]/vote gg[]\n此命令开始立即游戏结束的投票。\n[orange]/vote random[]\n此命令开始触发随机效果的投票。\n[orange]/vote reset[]\n此命令立即取消所有投票。\n\n[purple]== 示例[]\n/vote kick Gureumi 反正这人是笨蛋\n/vote map 2 这地图不行了，下一张\n/vote map maze 默认地图走起\n/vote skip 10\n/vote back 被搞破坏了，走起
command.help.nextmap=用法: [green]/nextmap [sky]<地图名称或编号>[][]\n在游戏结束后设置下一张地图。\n[purple]== 示例[]\n/nextmap 1\n/nextmap maze\n/nextmap fortress

command.help.weather=用法: [green]/weather [sky]<rain/snow/sandstorm/sporestorm> <时间>[][]\n在当前地图生成天气。\n时间单位为"秒"，可用天气为 rain, snow, sandstorm, sporestorm。\n天气一旦生成，在时间结束前无法取消。\n[purple]== 示例[]\n/weather rain 1\n/weather snow 6\n/weather sandstorm 10
