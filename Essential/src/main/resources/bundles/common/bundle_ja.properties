command.help.broadcast=使用方法: [green]/broadcast [sky]<メッセージ...>[][]\nこのサーバーに接続されているすべてのサーバーにメッセージを送信します。\n[purple]== 例[]\n/broadcast 10分後にサーバーが爆発します。\n/broadcast サーバーメンテナンス予定
command.help.changeMap=使用方法: [green]/changemap [sky]<マップ名> <ゲームモード>[][]\nマップを即座に変更します。\nゲームモードの値がない場合、ワールド変更時に以前のゲームモードを使用します。\n[purple]== 例[]\n/changemap 1\n/changemap 3 attack\n/changemap maze\n/changemap fortress pvp
command.help.changeName=使用方法: [green]/changepw [sky]<新しい名前> [対象プレイヤー][][]\nプレイヤー名を変更します。\n[purple]== 例[]\n/changename test1 Gureumi\n/changename ブラ ぐれうみ
command.help.changePw=使用方法: [green]/changepw [sky]<新しいパスワード> <パスワード再入力>[][]\nアカウントのパスワードを変更します。\n[purple]== 例[]\n/changepw test1 test1\n/changepw password123 password123
command.help.chars=使用方法: [green]/chars [sky]<文字>[][]\n現在位置にブロックで文字を書きます。(英語のみ)\n[purple]== 例[]\n/chars text\n/chars hello\n/chars it's text!
command.help.chat=使用方法: [green]/chat [sky]<on/off>[][]\nすべてのプレイヤーのチャットを禁止または解除します。\n[green]chat.admin[] 権限ノードを持つユーザーのみチャットできます。\n[purple]== 例[]\n/chat on\n/chat off
command.help.color=使用方法: [green]/color[]\n自分のニックネームを動く虹色に変更します。\nもう一度入力すると元のニックネームに戻ります。
command.help.discord=使用方法: [green]/discord[]\nDiscord認証用のPIN番号を生成します。\nこのPIN番号をDiscordサーバー内の特定チャンネルに入力すると認証が完了します。
command.help.dps=使用方法: [green]/dps[]\n1秒間のダメージ量を計算できるブロックを生成します。\nもう一度入力するとブロックが削除されます。
command.help.effect=使用方法: [green]/effect [sky]<on/off またはレベル> [色][][]\nレベル別エフェクトを設定したり、他のプレイヤーのレベル別エフェクトをオン/オフにできます。\n\nレベル別エフェクトの設定をしたい場合は、希望するレベルを入力すると、そのレベルにあった移動エフェクトを表示できます。\n現在のレベル以上には設定できません。\n色も変更できます。\n[purple]== 例[]\n/effect 10\n/effect 30 red\n/effect 50 sky\n\n他のプレイヤーのエフェクトをオン/オフにする場合は、on/off を使用してください。\n[purple]== 例[]\n/effect on\n/effect off
command.help.exp=使用方法: [green]/exp [sky]<set/hide/add/remove> [数字またはプレイヤー名] [プレイヤー名][][]\n経験値の値を設定したり、ランキングから除外します。\n[purple]== 例[]\n/exp hide\nランキングから現在のプレイヤーの順位を非表示にします。\n/exp set 300\n経験値の値を設定します。\n/exp set 500 Gureumi\n対象プレイヤーの経験値を設定します。\n/exp add 1000\n経験値を追加します。/exp remove 200\n経験値を削除します。
command.help.fillItems=使用方法: [green]/fillitems [sky][チーム名][][]\nコアをアイテムで補充します。\n[purple]== 例[]\n/fillitems\n/fillitems crux\n/fillitems sharded
command.help.freeze=使用方法: [green]/freeze [sky]<プレイヤー名>[][]\n対象プレイヤーをその場で動けないようにします。\n[purple]== 例[]\n/freeze Gureumi\n/freeze 2\n/freeze Gu
command.help.gg=使用方法: [green]/gg [勝利するチーム名][]\n文字通り即座に降参処理します。\n[purple]== 例[]\n/gg\n/gg crux
command.help.god=使用方法: [green]/god [sky]<プレイヤー名>[][]\nプレイヤーの体力を無限にします。\n[purple]== 例[]\n/god\n/god ニックネーム\n/god Gureumi
command.help.help=使用方法: [green]/help [sky]<ページ番号またはコマンド>[][]\nコマンド一覧を表示したり、該当コマンドの説明を表示します。\n[purple]== 例[]\n/help\n/help 2\n/help motd
command.help.hub=使用方法: [green]/hub [sky]<set/zone/block/count/total/remove> [サーバーIP] [オプション][][]\n現在位置に他のサーバーに移動できるゾーンやブロック、人数カウンターなどを作成します。\nユーザーが正しくサーバーに接続するには、サーバーアドレスは外部IPまたはドメインである必要があります。\n\n[purple]== 例[]\n[green]/hub set[]\n現在のサーバーをハブサーバーに設定し、プレイヤーチームを Derelict に設定します。\n[green]/hub zone mindustry.kr 10 true[]\nこのコマンドを入力し、開始地点と終了点をクリックして範囲を指定してください。\n指定された範囲内にユニットが入るか、クリックすることでこのサーバーに入場できます。\n[green]/hub block mindustry.kr owner's server[]\n現在位置にあるブロックをクリックすると mindustry.kr サーバーに接続するように設定します。\n該当ブロックにはサーバー人数および owner's server という説明メッセージが表示されます。\n該当ブロックを破壊すると自動的に消えます。\n[green]/hub count mindustry.kr[]\n現在位置にサーバー人数をブロックで表示します。\n[green]/hub total[]\n現在位置に /hub コマンドで接続した全サーバーの人数を合計してブロックで表示します。\n[green]/hub remove mindustry.kr:7000[]\n該当サーバーに移動するすべてのブロックと入場ゾーンを削除します。\n[green]/hub reset[]\nすべてのプレイヤーカウンターを削除します。
command.help.hud=使用方法: [green]/hud [sky]<種類>[][]\n画面に情報を表示します。\nもう一度入力するとHUDのオン/オフを切り替えられます。\n[purple]== 例[]\n/hud health - 画面に情報を表示します\n/hud apm - プレイヤーのAPM値を画面に表示します。
command.help.info=使用方法: [green]/info [sky]<プレイヤー名>[][]\n対象ユーザーの情報を表示します。\n[purple]== 例[]\n/info\n/info Gureumi
command.help.js=使用方法: [green]/js [sky]<コード>[][]\n入力したコードをサーバーで実行します。\nサーバーを直接制御するため、このコマンドの権限を他のユーザーに付与する際は注意してください。\n[purple]== 例[]\n/js Call.sendMessage("こんにちは！");\n/js Vars.netServer.admins.admins.toString();
command.help.kickAll=使用方法: [green]/kickall[]\n自分と管理者を除くすべてのユーザーをキックします。\nキックされたユーザーは一定時間サーバーに入場できません。
command.help.kill=使用方法: [green]/kill [sky]<プレイヤー名>[][]\n自分のユニットまたは相手のユニットを即座に破壊します。\n[purple]== 例[]\n/kill\n/kill Gureumi
command.help.killAll=使用方法: [green]/killall [sky]<チーム名>[][]\n自分のチームまたは該当チームの全ユニットを破壊します。\n[purple]== 例[]\n/killall\n/killall malis\n/killall derelict
command.help.killUnit=使用方法: [green]/killunit [sky]<ユニット名> [破壊するユニット数] [チーム名][][]\n特定のユニットを破壊します。\n破壊するユニット数の値がない、または0の場合は、該当するすべてのユニットを破壊します。\n[purple]== 例[]\n/killunit dagger\n/killunit alpha 5\n/killunit merui 0 crux
command.help.language=使用方法: [green]/language [sky]<ロケール>[][]\n現在のアカウントの言語を設定します。\n[purple]== 例[]\n/language en_US\n/language ko_KR
command.help.log=使用方法: [green]/log []\nブロックログを有効にします。\n[purple]== 例[]\n/log
command.help.login=使用方法: [green]/login [sky]<ID> <パスワード>[][]\n既存のアカウントにログインします。\n[purple]== 例[]\n/login yourid password\n/login blahblah loremipsum
command.help.maps=使用方法: [green]/maps [sky]<ページ番号>[][]\nサーバーにあるマップを表示します。\n[purple]== 例[]\n/maps\n/maps 3
command.help.me=使用方法: [green]/me [sky][発言][][]\n特殊なチャットフォーマットで自分のチャットを目立たせます。\n[purple]== 例[]\n/me 分配機を貼ってはいけません\n/me こんにちは！
command.help.meme=使用方法: [green]/meme [sky][種類][][]\nミームが満載のこのコマンドをお試しください！\n[purple]== 例[]\n/meme router
command.help.motd=使用方法: [green]/motd[]\n今日のサーバーメッセージを確認します。
command.help.mute=使用方法: [green]/mute [sky]<プレイヤー名>[][]\n対象プレイヤーをチャット禁止にします。\n[purple]== 例[]\n/mute Gureumi
command.help.not.exists=コマンドが見つかりません！/help と入力して一覧を確認してください。
command.help.pause=使用方法: [green]/pause[]\nゲームを一時停止します。このオプションはすべてのプレイヤーに影響します。
command.help.players=使用方法: [green]/players [sky]<ページ番号>[][]\n現在サーバーにいるプレイヤーの一覧を表示します。\n投票やニックネームに特定の文字が含まれる等の理由でプレイヤーを選択できない場合、数字のみ入力して使用できます。\n[purple]== 例[]\n/players\n/players 1\n/players 3
command.help.pm=使用方法: [green]/pm [sky]<プレイヤー名> [メッセージ...][][]\n対象プレイヤーにプライベートメッセージを送信します。\n[purple]== 例[]\n/pm 1 こんにちは！\n/pm Gureumi こんにちは！
command.help.ranking=使用方法: [green]/ranking [sky]<time/exp/attack/place/break/pvp> [ページ][][]\nプレイヤーランキングを表示します。\n[purple]== 例[]\n/ranking time\n/ranking place\n/ranking exp
command.help.reg=使用方法: [green]/reg [sky]<ID> <パスワード> <パスワード再入力>[][]\n一部のサーバーでは、会員登録が必要な場合があります。\nその場合、アカウント登録するとサーバーをプレイでき、プレイデータが記録されます。\nパスワードの誤入力を防ぐため、同じパスワードを2回入力する必要があります。\n[green]== 正しい方法[]\n/reg Gureumi password password\n[scarlet]== 間違った方法[]\n/reg Gureumi password blahblah
command.help.report=使用方法: [green]/report [sky]<プレイヤー名> <報告理由...>[][]\nプレイヤーを報告します。\n管理者またはサーバー運営者が確認し、処理できます。\n[purple]== 例[]\n/report Gureumi この人が暴言を吐いています\n/report Baka この人が破壊行為をしています
command.help.rollback=使用方法: [green]/rollback [sky]<プレイヤー名>[][]\n特定のプレイヤーが行った操作を取り消します。\n[purple]== 例[]\n/rollback Gureumi\n/rollback baka
command.help.search=使用方法: [green]/search [sky]<プレイヤー名>[][]\nプレイヤーに関する情報が必要なときに使用します。\nこの機能は対象プレイヤーがオフラインの場合でも使用できます。\n[purple]== 例[]\n/search Gureumi
command.help.setItem=使用方法: [green]/setitem [sky]<アイテム名> <個数> [チーム名][][]\nコア内のアイテム数を設定します。\n[purple]== 例[]\n/setitem copper 100\n/setitem lead 500/n/setitem silicon sharded
command.help.setPerm=使用方法: [green]/setperm [sky]<プレイヤー名> <グループ名>[][]\n対象プレイヤーの権限グループを設定します。\nグループ一覧はサーバー内の permission.txt ファイルで確認できます。\n[purple]== 例[]\n/setperm Gureumi owner\n/setperm Gureumi admin
command.help.skip=使用方法: [green]/team [sky]<チーム名> <プレイヤー名>[][]\n自分のチームまたは相手のチームを変更します。\n使用可能なチームは derelict, sharded, crux, green, malis, blue です。\nPvPやアタック等で使用する場合、マップ設定によって予期しない結果になる可能性があります！\n[purple]== 例[]\n/skip 5\n/skip 8
command.help.spawn=使用方法: [green]/spawn [sky]<unit/block> <ユニット/ブロック名> [個数(角度)/ブロックチーム名] [ユニットチーム名][][]\nユニットまたはブロックを召喚します。\n[purple]== 例[]\n/spawn unit dagger 10\n現在のプレイヤー位置にダガーユニットを10体召喚します。\n/spawn block duo 90\n現在のプレイヤー位置に右向きのデュオ砲台ブロックを召喚します。\n/spawn block copper-wall crux\n現在位置に crux チームの銅壁を設置します。
command.help.status=使用方法: [green]/status[]\nサーバー情報を表示します。\nTPSが55未満に低下した場合、サーバーのパフォーマンスが限界に達しており、ゲームに遅延が発生していることを示します。
command.help.strict=使用方法: [green]/strict [sky]<プレイヤー名>[][]\n対象プレイヤーの行動を制限します。\n観戦者や破壊行為を行うユーザーに有効です。\n[purple]== 例[]\n/strict Gureumi\n/strict 3\n/strict reumi
command.help.team=使用方法: [green]/team [sky]<チーム名> <プレイヤー名>[][]\n自分のチームまたは相手のチームを変更します。\n使用可能なチームは derelict, sharded, crux, green, malis, blue です。\n[purple]== 例[]\n/team crux\n/team Gureumi crux\n/team Gureumi green
command.help.tempBan=使用方法: [green]/tempban [sky]<プレイヤー名> <時間> <BAN理由>[][]\n対象プレイヤーを一定時間BANします。\n時間の単位は「分」です。\n[purple]== 例[]\n/tempban Gureumi 5 バカだから\n/tempban Gureumi 60 連投禁止
command.help.time=使用方法: [green]/time[]\nサーバータイムを表示します。
command.help.tp=使用方法: [green]/tp [sky]<プレイヤー名>[][]\n対象プレイヤーの位置に即座に移動します。\n[purple]== 例[]\n/tp Gureumi
command.help.tpp=使用方法: [green]/tpp [sky]<プレイヤー名>[][]\nカメラを対象プレイヤーに固定します。\n対象プレイヤーがサーバーから退出するか、コマンドをもう一度入力するとカメラ固定を解除します。\n[purple]== 例[]\n/tpp Gureumi\n/tpp バカ
command.help.unban=使用方法: [green]/unban [sky]<uuid/ip>[][]\nプレイヤーのBANを解除します。\n[purple]== 例[]\n/unban AAAAAAAAAAAAAAA==\n/unban 127.0.0.1
command.help.unmute=使用方法: [green]/unmute [sky]<プレイヤー名>[][]\n対象プレイヤーのチャット禁止を解除します。\n[purple]== 例[]\n/unmute Gureumi
command.help.url=使用方法: [green]/url [sky]<コマンド名>[][]\n特定のコマンドに含まれるURLを開きます。このコマンドを使用すると外部Webブラウザーに接続します。\n[purple]== 例[]\n/url hub
command.help.vote=使用方法: [green]/vote [sky]<kick/map/gg/skip/back/random/reset> [プレイヤー名/回数/マップ名] [理由][][]\n投票で指定されたマップへの移動やゲームオーバー、キック、ウェーブスキップなどができます。\n[brown]== コマンド構造[]\n[orange]/vote kick <名前> <キック理由>[]\nこのコマンドはプレイヤーを追放するための投票を開始します。\n[orange]/vote map <マップ名の一部またはマップ番号> <マップ選択理由>[]\nこのコマンドは該当マップに移動するための投票を開始します。\n[orange]/vote skip <スキップするウェーブ数>[]\nこのコマンドは wave に入力された数字だけ一気に進行する投票を開始します。\n[orange]/vote back <バックアップ復元理由>[]\nこのコマンドは以前保存したマップ状態を復元する投票を開始します。\n[orange]/vote gg[]\nこのコマンドは即時ゲームオーバーにする投票を開始します。\n[orange]/vote random[]\nこのコマンドはランダム効果を発動する投票を開始します。\n[orange]/vote reset[]\nこのコマンドはすべての投票を即座にキャンセルします。\n\n[purple]== 例[]\n/vote kick Gureumi とにかくこの人はバカです\n/vote map 2 このマップは終わったので次へ\n/vote map maze 基本マップ行こう\n/vote skip 10\n/vote back 破壊されたので戻して
command.help.nextmap=使用方法: [green]/nextmap [sky]<マップ名または番号>[][]\nゲームオーバー後の次のマップを設定します。\n[purple]== 例[]\n/nextmap 1\n/nextmap maze\n/nextmap fortress

command.help.weather=使用方法: [green]/weather [sky]<rain/snow/sandstorm/sporestorm> <時間>[][]\n現在のマップに天候を生成します。\n時間の単位は「秒」で、使用可能な天候は rain, snow, sandstorm, sporestorm です。\n天候が一度生成されると、時間が経過するまでキャンセルできません。\n[purple]== 例[]\n/weather rain 1\n/weather snow 6\n/weather sandstorm 10
